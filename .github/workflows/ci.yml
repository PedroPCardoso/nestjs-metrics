name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build dev image
        run: docker compose build dev

      - name: Install dependencies
        run: docker compose run --rm dev npm install

      - name: Lint
        run: docker compose run --rm dev npm run lint

      - name: Typecheck
        run: docker compose run --rm dev npm run typecheck

      - name: Start databases (Postgres + MySQL)
        run: docker compose up -d --wait postgres mysql

      - name: Load MySQL timezone tables (zones used by tests)
        run: bash scripts/load-mysql-tz.sh

      - name: Test (SQLite + Postgres + MySQL)
        run: docker compose run --rm -e PG_HOST=postgres -e MYSQL_HOST=mysql dev npm test

      - name: Build
        run: docker compose run --rm dev npm run build

      # NOTE: the consumer smoke is temporarily disabled while the monorepo is
      # pre-publish — the façade depends on @pedropcardoso/metrics-* which aren't on npm
      # yet, so a packed tarball can't resolve them in a fresh project. Re-enable
      # (re-tooled to pack all workspace packages together) once they publish.

      - name: Stop databases
        if: always()
        run: docker compose down -v
